<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Exogenesis — Exoplanet Tool</title>
  <meta name="description" content="Exogenesis — an ultra-realistic exoplanet tool. Design a world, model its physics and habitability against real NASA data, and render it live." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='11' fill='%2338e1ff'/><circle cx='12' cy='12' r='3' fill='%23d7faff'/></svg>" />
</head>
<body>
  <div id="scene"></div>

  <header class="topbar">
    <a class="brand" href="https://exogenesis.in">EXOGENESIS</a>
    <span class="tagline">exoplanet biosphere &amp; habitability engine</span>
    <span id="status" class="status">initialising…</span>
  </header>

  <main class="hud">
    <!-- LEFT: parameters -->
    <section class="panel">
      <div class="panel-head"><span class="idx">01</span><h2>Parameters</h2></div>

      <div class="control">
        <label for="star">Host star</label>
        <select id="star">
          <option value="M">M — Red dwarf</option>
          <option value="K">K — Orange dwarf</option>
          <option value="G" selected>G — Sun-like</option>
          <option value="F">F — Yellow-white</option>
          <option value="A">A — White</option>
        </select>
      </div>

      <div class="control"><label for="mass">Mass <span class="v"><span id="massV">1.0</span> M⊕</span></label>
        <input type="range" id="mass" min="0.1" max="10" step="0.1" value="1" /></div>
      <div class="control"><label for="radius">Radius <span class="v"><span id="radiusV">1.0</span> R⊕</span></label>
        <input type="range" id="radius" min="0.3" max="3" step="0.1" value="1" /></div>
      <div class="control"><label for="dist">Orbital distance <span class="v"><span id="distV">1.00</span> AU</span></label>
        <input type="range" id="dist" min="0.1" max="5" step="0.05" value="1" /></div>
      <div class="control"><label for="rotation">Rotation <span class="v"><span id="rotationV">24</span> h</span></label>
        <input type="range" id="rotation" min="1" max="2000" step="1" value="24" /></div>
      <div class="control"><label for="water">Surface water <span class="v"><span id="waterV">71</span> %</span></label>
        <input type="range" id="water" min="0" max="100" step="1" value="71" /></div>

      <h3 class="sub">Atmosphere</h3>
      <div class="control gas"><label for="gasN2"><span class="gn"><i class="dot" style="--d:var(--gas-n2)"></i>Nitrogen N₂</span><span class="v"><span id="gasN2V">78</span>%</span></label>
        <input type="range" id="gasN2" min="0" max="100" step="1" value="78" /></div>
      <div class="control gas"><label for="gasO2"><span class="gn"><i class="dot" style="--d:var(--gas-o2)"></i>Oxygen O₂</span><span class="v"><span id="gasO2V">21</span>%</span></label>
        <input type="range" id="gasO2" min="0" max="100" step="1" value="21" /></div>
      <div class="control gas"><label for="gasCO2"><span class="gn"><i class="dot" style="--d:var(--gas-co2)"></i>CO₂</span><span class="v"><span id="gasCO2V">0</span>%</span></label>
        <input type="range" id="gasCO2" min="0" max="100" step="1" value="0" /></div>
      <div class="control gas"><label for="gasCH4"><span class="gn"><i class="dot" style="--d:var(--gas-ch4)"></i>Methane CH₄</span><span class="v"><span id="gasCH4V">0</span>%</span></label>
        <input type="range" id="gasCH4" min="0" max="100" step="1" value="0" /></div>
      <div class="control gas"><label for="gasH2"><span class="gn"><i class="dot" style="--d:var(--gas-h2)"></i>Hydrogen H₂</span><span class="v"><span id="gasH2V">0</span>%</span></label>
        <input type="range" id="gasH2" min="0" max="100" step="1" value="0" /></div>
      <div class="control gas"><label for="gasH2O"><span class="gn"><i class="dot" style="--d:var(--gas-h2o)"></i>Water vapour H₂O</span><span class="v"><span id="gasH2OV">1</span>%</span></label>
        <input type="range" id="gasH2O" min="0" max="100" step="1" value="1" /></div>
      <div class="atmo-total" id="atmoTotalBox"><span>Σ composition</span><span><span id="atmoTotal">100</span>%</span></div>
    </section>

    <!-- RIGHT: analysis -->
    <section class="panel">
      <div class="panel-head"><span class="idx">02</span><h2>Analysis</h2></div>
      <div id="planetCard"></div>
      <div id="habitability"></div>
      <div class="metrics" id="metrics"></div>
      <div class="analog-card" id="analogCard"></div>

      <h3 class="sub">Biosphere <span class="spec">speculative</span></h3>
      <div class="bio-summary" id="bioSummary"></div>
      <div class="bio-findings" id="bioFindings"></div>
      <div class="eco-chain" id="ecosystem"></div>

      <button class="report-btn" id="reportBtn">Generate field report</button>
      <div class="field-report" id="fieldReport"></div>
    </section>
  </main>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
